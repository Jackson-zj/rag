services:
  pgvector:
    image: ${PGVECTOR_IMAGE:-pgvector/pgvector:pg17}
    container_name: pgvector
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: rag_db
    ports:
      - "${PGVECTOR_PORT:-5433}:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    ports:
      - "${REDIS_PORT:-6379}:6379"

  rabbitmq:
    image: ${RABBITMQ_IMAGE:-rabbitmq:3-management}
    environment:
      RABBITMQ_DEFAULT_USER: rag
      RABBITMQ_DEFAULT_PASS: rag
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"

  ai-service:
    build:
      context: ../ai-service
      args:
        DOCKERHUB_LIBRARY_PREFIX: ${DOCKERHUB_LIBRARY_PREFIX:-}
    environment:
      VECTOR_DATABASE_URL: postgresql://postgres:123456@pgvector:5432/rag_db
      MODEL_BASE_URL: ${MODEL_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      MODEL_API_KEY: ${MODEL_API_KEY:-}
      MODEL_NAME: ${MODEL_NAME:-qwen3.7-plus}
      TEXT2SQL_SCHEMA_TOP_K: ${TEXT2SQL_SCHEMA_TOP_K:-2}
      TEXT2SQL_MAX_REPAIRS: ${TEXT2SQL_MAX_REPAIRS:-1}
      TEXT2SQL_PLANNER_TIMEOUT_SECONDS: ${TEXT2SQL_PLANNER_TIMEOUT_SECONDS:-10}
      TEXT2SQL_PLANNER_MODEL: ${TEXT2SQL_PLANNER_MODEL:-qwen3.7-plus}
    depends_on:
      - pgvector
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"

  backend-java:
    build:
      context: ..
      dockerfile: backend-java/Dockerfile
      args:
        DOCKERHUB_LIBRARY_PREFIX: ${DOCKERHUB_LIBRARY_PREFIX:-}
    environment:
      AI_SERVICE_URL: http://ai-service:8000
      DATABASE_URL: jdbc:postgresql://pgvector:5432/rag_db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: 123456
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: rag
      RABBITMQ_PASSWORD: rag
    depends_on:
      - pgvector
      - ai-service
      - rabbitmq
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ../frontend
      args:
        DOCKERHUB_LIBRARY_PREFIX: ${DOCKERHUB_LIBRARY_PREFIX:-}
    depends_on:
      - backend-java
    ports:
      - "${FRONTEND_PORT:-5173}:80"

  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.55.0}
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:11.3.0}
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "${GRAFANA_PORT:-3000}:3000"

volumes:
  pgvector_data:
