server:
  port: 8080
  error:
    include-message: always

spring:
  application:
    name: enterprise-rag-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/rag_db}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:123456}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:rag}
    password: ${RABBITMQ_PASSWORD:rag}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

rag:
  ai-service-url: ${AI_SERVICE_URL:http://127.0.0.1:8000}
  agent-internal-token: ${AGENT_INTERNAL_TOKEN:}
  rabbit:
    document-index-queue: document.index
